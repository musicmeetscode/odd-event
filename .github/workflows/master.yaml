name: Deploy to Master Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: false
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Copy production environment file
        run: cp backend/.env.prod backend/.env || true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        run: echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u musicmeetscode --password-stdin

      - name: Build and Push Docker Image with Cache
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/musicmeetscode/odd-event:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: SSH into Server and Deploy
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_KEY }}
          script: |
            echo "${{ secrets.GHCR_PAT }}" | docker login ghcr.io -u musicmeetscode --password-stdin 
            docker rm -f odd-event || true 
            docker image prune -a -f
            docker pull ghcr.io/musicmeetscode/odd-event:latest 
            docker run -d --name odd-event --network=app-network \
              -p 127.0.0.1:8000:8000 \
              --restart always \
              -v /home/main/static:/app/staticfiles \
              -v /home/main/media:/app/media \
              -v /etc/letsencrypt/live:/etc/letsencrypt/live \
              -v /etc/letsencrypt/archive:/etc/letsencrypt/archive \
              -v /etc/letsencrypt/renewal:/etc/letsencrypt/renewal  \
              ghcr.io/musicmeetscode/odd-event:latest
